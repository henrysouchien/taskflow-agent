async function newConversation() {
  if (!S.chat.historyReady || S.chat.streaming) return
  try {
    const res = await fetch('/api/chat/history/reset', { method: 'POST' })
    if (!res.ok) throw new Error(res.status)
    S.chat.messages = []
    resetChatTurnState()
    saveChatMessages()
    renderChat()
    setChatStatus('Ready')
  } catch (_) {
    setChatStatus('Could not reset; try again')
  }
}

function setupChatInput() {
  const input = document.getElementById('chat-input')
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      sendChat()
    }
  })
}

function buildChatPayload() {
  const context = { view: S.view }
  if (S.view === 'project' && S.projectId) context.project_id = S.projectId
  if (S.view === 'search' && S.lastSearchQuery) context.search_query = S.lastSearchQuery
  return {
    message: S.chat.messages[S.chat.messages.length - 1]?.content || '',
    context,
  }
}

async function sendChat() {
  if (!S.chat.historyReady || S.chat.streaming) return
  const input = document.getElementById('chat-input')
  const text = input.value.trim()
  if (!text) return

  toggleChat(true)
  appendChatMessage('user', text, { persist: true })
  input.value = ''
  resetChatTurnState()
  setChatStreaming(true)

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(buildChatPayload()),
    })

    if (!response.ok) {
      let msg = `Chat unavailable (${response.status})`
      try {
        const data = await response.json()
        msg = data.error || msg
      } catch (_) {}
      throw new Error(msg)
    }

    if (!response.body) throw new Error('Chat stream unavailable')

    const reader = response.body.getReader()
    const decoder = new TextDecoder()
    let buffer = ''
    let finished = false

    while (true) {
      const { value, done } = await reader.read()
      if (done) break
      buffer += decoder.decode(value, { stream: true })

      const parts = buffer.split('\n\n')
      buffer = parts.pop() || ''

      for (const part of parts) {
        const lines = part.split('\n').filter(line => line.startsWith('data: '))
        if (!lines.length) continue
        const payload = lines.map(line => line.slice(6)).join('\n')
        if (!payload) continue
        const event = JSON.parse(payload)
        finished = await handleChatEvent(event) || finished
      }
    }

    if (!finished) finishChatStream(S.chat.currentAssistantText)
  } catch (err) {
    rollbackOptimisticChat(err.message || 'Error')
  }
}

async function handleChatEvent(event) {
  if (!event || !event.type) return false

  if (event.type === 'heartbeat') return false

  if (event.type === 'text_delta') {
    S.chat.currentAssistantText += event.text || ''
    updateStreamingAssistant(S.chat.currentAssistantText)
    return false
  }

  if (event.type === 'tool_call_start') {
    appendToolCard(event.tool_call_id, event.tool_name, event.tool_input)
    S.chat.turnTools.push({ id: event.tool_call_id, name: event.tool_name, input: event.tool_input, result: null, error: null })
    return false
  }

  if (event.type === 'tool_call_complete') {
    completeToolCard(event.tool_call_id, event.tool_name, event.result, event.error)
    const entry = S.chat.turnTools.find(t => t.id === event.tool_call_id)
    if (entry) {
      entry.result = event.result
      entry.error = event.error
    }
    return false
  }

  if (event.type === 'taskflow_mutation') {
    await handleChatMutation(event)
    return false
  }

  if (event.type === 'done') {
    finishChatStream(event.assistant_text || '')
    return true
  }

  if (event.type === 'error') {
    const errorMsg = event.error || 'Unknown error'
    rollbackOptimisticChat(
      errorMsg === 'save_failed' ? 'Could not save message; try again' : errorMsg
    )
    return true
  }

  return false
}

function finishChatStream(assistantText) {
  const toolSummary = _buildToolSummary()
  let fullContent = (assistantText || '') + toolSummary
  if (!fullContent.trim()) fullContent = '(empty response)'

  if (assistantText) {
    updateStreamingAssistant(assistantText)
  } else if (fullContent === '(empty response)') {
    if (S.chat.currentAssistantEl) {
      S.chat.currentAssistantEl.innerHTML = `<div class="md">${md(fullContent)}</div>`
    } else {
      appendChatMessage('assistant', fullContent, { persist: false })
    }
  } else if (S.chat.currentAssistantEl) {
    S.chat.currentAssistantEl.parentElement.remove()
    S.chat.currentAssistantEl = null
  }

  // Collapse individual tool cards into a single summary row above the assistant message
  const chatMsgs = document.getElementById('chat-messages')
  const toolRows = Array.from(chatMsgs.querySelectorAll('.chat-row.tool'))
  if (toolRows.length > 0) {
    const uniqueTools = [...new Set(S.chat.turnTools.map(t => t.name.replace(/^tf_/, '')))]
    const label = uniqueTools.length <= 3 ? uniqueTools.join(', ') : `${toolRows.length} tools`
    const groupRow = document.createElement('div')
    groupRow.className = 'chat-row tool'
    const groupDetails = document.createElement('details')
    groupDetails.className = 'chat-tool-group'
    const hasError = S.chat.turnTools.some(t => t.error)
    groupDetails.innerHTML = `<summary><span class="chat-tool-name">${esc(label)}</span> <span class="chat-tool-state ${hasError ? 'error' : ''}">${hasError ? 'errors' : 'done'}</span></summary>`
    const groupBody = document.createElement('div')
    groupBody.className = 'chat-tool-group-body'
    toolRows.forEach(tr => {
      tr.classList.remove('chat-row')
      groupBody.appendChild(tr)
    })
    groupDetails.appendChild(groupBody)
    groupRow.appendChild(groupDetails)
    // Insert before the assistant bubble
    const assistantRow = S.chat.currentAssistantEl ? S.chat.currentAssistantEl.closest('.chat-row') : null
    if (assistantRow) {
      chatMsgs.insertBefore(groupRow, assistantRow)
    } else {
      chatMsgs.appendChild(groupRow)
    }
  }

  S.chat.messages.push({ role: 'assistant', content: fullContent })
  saveChatMessages()
  resetChatTurnState()
  setChatStreaming(false)
}

async function handleChatMutation(event) {
  await Promise.all([loadProjects(), loadBadges()])
  await refreshCurrentView({ reloadSidebar: false })
  if (S.selTaskId && event.entity_type === 'task') await refreshSelectedTask()
}

/* ================================================================
   HELPERS
   ================================================================ */
function setHeader(icon, title, meta) {
  document.getElementById('h-icon').textContent = icon
  document.getElementById('h-title').textContent = title
  document.getElementById('h-meta').textContent = meta
  const old = document.getElementById('main-header').querySelector('.phase-select')
  if (old) old.remove()
}

function toggleSpec(hdr) {
  hdr.classList.toggle('collapsed')
  hdr.closest('.spec-group').classList.toggle('collapsed')
}

function toggleSpecPlan(btn) {
  const plan = btn.closest('.spec-group').querySelector('.spec-plan')
  if (plan) plan.style.display = plan.style.display === 'none' ? 'block' : 'none'
}

function toggleCompleted(el) {
  el.classList.toggle('open')
  el.nextElementSibling.classList.toggle('show')
}

function show(id) { document.getElementById(id).style.display = 'flex' }
function hide(id) { document.getElementById(id).style.display = 'none' }
function closeModal(id, e) { if (e.target === e.currentTarget) hide(id) }

function esc(s) {
  if (!s) return ''
  const d = document.createElement('div')
  d.textContent = s
  return d.innerHTML
}

function dueClass(due, status) {
  if (!due || status === 'completed') return ''
  const today = new Date().toISOString().slice(0, 10)
  const soon = new Date(Date.now() + 7 * 864e5).toISOString().slice(0, 10)
  if (due < today) return 'overdue'
  if (due <= soon) return 'soon'
  return ''
}

function autoResize(el) {
  el.style.height = 'auto'
  el.style.height = `${el.scrollHeight}px`
}

function toast(msg) {
  const t = document.createElement('div')
  t.className = 'toast'
  t.textContent = msg
  document.body.appendChild(t)
  setTimeout(() => t.remove(), 2000)
}

function setupKeys() {
  document.addEventListener('keydown', e => {
    const key = e.key.toLowerCase()
    if (key === '/' && !editing()) {
      e.preventDefault()
      document.getElementById('search-input').focus()
    }
    if (key === 'c' && !editing()) {
      e.preventDefault()
      toggleChat()
    }
    if (e.key === 'Escape') {
      if (document.getElementById('modal-project').style.display === 'flex') hide('modal-project')
      else if (document.getElementById('modal-task').style.display === 'flex') hide('modal-task')
      else if (document.getElementById('modal-plan').style.display === 'flex') hide('modal-plan')
      else if (document.getElementById('modal-focus-picker').style.display === 'flex') hide('modal-focus-picker')
      else if (document.getElementById('modal-goals').style.display === 'flex') hide('modal-goals')
      else if (document.getElementById('task-detail-modal').style.display === 'flex') closeDetail()
      document.getElementById('search-input').blur()
    }
    if (key === 'n' && !editing() && S.projectId) {
      e.preventDefault()
      openTaskModal()
    }
  })
}

function editing() {
  const el = document.activeElement
  return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT')
}

init()
